# A generic, single database configuration.

[alembic]
script_location = %(here)s/backend/alembic
prepend_sys_path = .
path_separator = os

# This is just a placeholder.
# The real database URL is loaded from .env inside env.py.
sqlalchemy.url = postgresql+psycopg://placeholder:placeholder@localhost:5432/placeholder


[post_write_hooks]
# Example:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic


[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic


[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
